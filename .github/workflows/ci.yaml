name: tyk-sre-assignment

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: golang
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: golang/go.mod
      - run: go vet ./...
      - run: go test ./... -race
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: golang
      - uses: azure/setup-helm@v4
      - run: helm lint ../helm

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # Push only on main; PRs build for validation but do not push.
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/SowmyaRahul/tyk-sre-assignment:${{ github.sha }}
            ghcr.io/SowmyaRahul/tyk-sre-assignment:latest

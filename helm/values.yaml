image:
  repository: ghcr.io/SowmyaRahul/tyk-sre-assignment
  tag: ""            
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 8080

rbac:
  create: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

selfNetworkPolicy:
  enabled: true
  allowFromNamespaces: []   # e.g. ["sre-tools"]; empty = same-namespace only
